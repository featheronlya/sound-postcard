<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>聲音郵局 | Sound Postcard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;500&family=Cormorant+Garamond:ital,wght@0,400;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --accent: #fff;
            --glass: rgba(0, 0, 0, 0.3);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: #000; color: #fff;
            overflow: hidden;
            font-family: 'Noto Serif TC', serif;
        }

        #map { height: 100vh; width: 100%; filter: grayscale(0.2); }

        /* 沉浸式展示層 */
        #image-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none; z-index: 2000;
        }

        #bg-image {
            width: 100%; height: 100%;
            background-repeat: no-repeat; background-position: center;
            opacity: 0; transition: opacity 2s ease-in-out, transform 15s linear;
        }
        #bg-image.zooming { transform: scale(1.1); }

        /* 磨砂玻璃文字區 */
        #info-text {
            position: absolute; bottom: 10%; left: 50px;
            max-width: 400px; z-index: 2100;
            padding: 30px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-left: 1px solid rgba(255,255,255,0.2);
            pointer-events: none;
        }

        #loc-name {
            font-size: 1.8rem; font-weight: 500; margin: 0 0 15px 0;
            letter-spacing: 3px;
        }

        #loc-desc {
            font-size: 0.9rem; line-height: 2; color: rgba(255,255,255,0.7);
            font-weight: 300; margin: 0;
        }

        /* 藝術感按鈕 */
        .ui-btn {
            position: absolute; z-index: 3000;
            background: none; border: 1px solid rgba(255,255,255,0.3);
            color: #fff; padding: 10px 20px;
            font-family: 'Cormorant Garamond', serif;
            letter-spacing: 2px; cursor: pointer; transition: 0.4s;
        }
        .ui-btn:hover { background: #fff; color: #000; }

        #back-btn { top: 40px; left: 40px; display: none; }
        #surprise-btn { bottom: 40px; left: 40px; }

        /* 聲音郵戳 */
        #stamp {
            position: absolute; bottom: 60px; right: 60px; z-index: 3000;
            border: 1px solid rgba(255,255,255,0.4); padding: 20px;
            font-family: 'Cormorant Garamond', serif; text-transform: uppercase;
            font-size: 0.7rem; line-height: 1.6; letter-spacing: 1px;
            opacity: 0; transform: rotate(10deg) scale(1.2);
            transition: 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }
        #stamp.active { opacity: 0.7; transform: rotate(-5deg) scale(1); }

        /* 自定義星光標記 */
        .glow-point {
            width: 8px; height: 8px; background: #fff; border-radius: 50%;
            box-shadow: 0 0 15px #fff;
            animation: breathe 4s infinite ease-in-out;
        }
        @keyframes breathe {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.4); }
        }

        @media (max-width: 768px) {
            #info-text { left: 20px; right: 20px; bottom: 120px; padding: 20px; }
            #stamp { bottom: 40px; right: 20px; scale: 0.8; }
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="image-overlay">
        <div id="bg-image"></div>
        <div id="info-text">
            <h2 id="loc-name"></h2>
            <p id="loc-desc"></p>
            <p id="tech-info" style="font-size: 0.6rem; margin-top: 20px; opacity: 0.4; font-family: monospace;"></p>
        </div>
    </div>

    <button id="back-btn" class="ui-btn">LEAVE THE SCENE</button>
    <button id="surprise-btn" class="ui-btn">SURPRISE ME</button>
    
    <div id="stamp">
        COLLECTED AT: <span id="stamp-loc"></span><br>
        <span id="stamp-coord"></span><br>
        SEASONAL: <span id="stamp-term"></span><br>
        VERIFIED RECORDING
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
