<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>聲音郵局 | Sound Postcard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --accent: #fff;
            --glass: rgba(0, 0, 0, 0.4);
        }

        *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: #000; color: #fff;
            overflow: hidden;
            font-family: 'Noto Serif TC', serif;
        }

        #map { height: 100vh; width: 100%; filter: grayscale(0.2); }

        #intro {
            position: fixed; inset: 0; z-index: 9999;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer; transition: opacity 1.5s ease;
        }
        #intro.fade-out { opacity: 0; pointer-events: none; }

        #image-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none; z-index: 2000;
        }
        #bg-image {
            width: 100%; height: 100%;
            background-repeat: no-repeat; background-position: center;
            opacity: 0; transition: opacity 0.8s ease, transform 22s linear;
        }
        #bg-image.zooming { transform: scale(1.1); }

        #info-text {
            position: absolute; bottom: 40px; left: 40px;
            max-width: 320px; z-index: 2100;
            padding: 22px 26px;
            background: var(--glass);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-left: 1.5px solid rgba(255,255,255,0.4);
            pointer-events: none; opacity: 0;
            transition: opacity 2s ease 0.8s;
        }

        /* ── 郵戳：加長版的蓋印動畫 ── */
        #stamp {
            position: absolute; bottom: 40px; right: 40px; z-index: 3000;
            border: 1.5px solid rgba(255,255,255,0.5); padding: 12px 14px;
            font-family: 'Cormorant Garamond', serif; text-transform: uppercase;
            font-size: 0.6rem; line-height: 1.6; letter-spacing: 1.2px;
            opacity: 0; pointer-events: none; transform-origin: center;
            color: rgba(255,255,255,0.9);
        }

        /* 修改後的動畫參數：時間加長至 1.2s，使用自定義貝茲曲線增強重力感 */
        .stamp-effect { 
            animation: stamp-drop-long 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards; 
        }

        @keyframes stamp-drop-long {
            0% { 
                opacity: 0; 
                transform: rotate(-20deg) scale(3); 
                filter: blur(8px);
            }
            30% { 
                opacity: 0.8; 
                transform: rotate(-15deg) scale(1.8); 
                filter: blur(2px);
            }
            /* 觸底瞬間 */
            70% { 
                opacity: 1; 
                transform: rotate(-5deg) scale(0.95); 
                filter: blur(0px);
            }
            /* 輕微回彈 */
            85% { 
                transform: rotate(-6deg) scale(1.05); 
            }
            /* 最終穩定 */
            100% { 
                opacity: 0.6; 
                transform: rotate(-5deg) scale(1); 
                filter: blur(0px);
            }
        }

        .ui-btn {
            position: absolute; z-index: 3000;
            background: none; border: 1px solid rgba(255,255,255,0.3);
            color: #fff; padding: 10px 20px;
            font-family: 'Cormorant Garamond', serif;
            letter-spacing: 2px; cursor: pointer; font-size: 0.75rem;
        }
        #back-btn { top: 30px; left: 20px; display: none; }
        #surprise-btn { bottom: 25px; left: 50%; transform: translateX(-50%); width: 160px; }

        #pulse-wrap {
            position: absolute; top: 30px; right: 20px; z-index: 3100;
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: 1s;
        }
        #pulse-ring {
            width: 12px; height: 12px; border-radius: 50%;
            background: #fff; transition: transform 0.1s ease-out;
        }

        .glow-point {
            width: 12px; height: 12px; background: #fff; border-radius: 50%;
            box-shadow: 0 0 15px #fff; animation: breathe 4s infinite;
        }
        @keyframes breathe { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.4); } }

        @media (max-width: 768px) {
            #info-text { 
                left: 0; right: 0; bottom: 0; max-width: none; 
                padding: 30px 25px 80px;
                border-left: none; border-top: 1px solid rgba(255,255,255,0.2);
            }
            #stamp { 
                bottom: auto; top: 80px; right: 20px; 
                transform: scale(0.85); 
            }
        }
    </style>
</head>
<body>

    <div id="intro">
        <h1 id="intro-title" style="letter-spacing: 0.4em;">聲音郵局</h1>
        <div id="intro-line"></div>
        <p style="font-family:'Cormorant Garamond'; color:rgba(255,255,255,0.4); margin-top:15px; font-style: italic;">Sound Postcard</p>
    </div>

    <div id="map"></div>

    <div id="image-overlay">
        <div id="bg-image"></div>
        <div id="info-text">
            <h2 id="loc-name" style="margin:0 0 12px 0; font-weight: 500; letter-spacing: 2px;"></h2>
            <p id="loc-desc" style="margin:0; line-height: 1.8; font-size: 0.85rem; color: rgba(255,255,255,0.85);"></p>
        </div>
    </div>

    <button id="back-btn" class="ui-btn">BACK</button>
    <button id="surprise-btn" class="ui-btn">SURPRISE ME</button>

    <div id="stamp">
        Collected at: <span id="stamp-loc"></span><br>
        <span id="stamp-coord"></span><br>
        Original Recording
    </div>

    <div id="pulse-wrap"><div id="pulse-ring"></div></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
